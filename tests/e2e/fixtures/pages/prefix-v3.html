<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Fixture DevWind — préfixe de site v3</title>
  </head>
  <body>
    <!-- Convention v3 : le préfixe est collé directement devant le nom de classe (pas de `:`
         comme en v4). 3+ classes préfixées reconnues pour que detectSitePrefix() détecte "tw-". -->
    <button id="target-btn" class="tw-bg-red-500 tw-p-4 tw-text-white">Préfixe A</button>
    <div id="prefix-b" class="tw-bg-red-500 tw-p-4">Préfixe B</div>
    <div id="prefix-c" class="tw-bg-red-500 tw-p-4">Préfixe C</div>
  </body>
</html>
